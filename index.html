<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Permanent+Marker&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, rgba(100,0,200,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,200,255,0.08) 0%, transparent 50%), #0d0a14;
    font-family: 'Rajdhani', sans-serif; color: #e0e0e0;
    padding: 8px; overflow-x: hidden;
  }
  h1 {
    font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900;
    letter-spacing: 6px; text-transform: uppercase; margin-bottom: 0;
    background: linear-gradient(135deg, #00f0ff, #ff2d95);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ai-name {
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem; opacity: 0.5;
    letter-spacing: 3px; margin-bottom: 2px; color: #ff2d95;
  }
  .controls { display: flex; gap: 8px; margin-bottom: 4px; align-items: center; }
  .voice-btn {
    font-family: 'Orbitron', sans-serif; font-size: 0.55rem; font-weight: 700;
    padding: 4px 12px; border-radius: 4px; cursor: pointer;
    letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
    border: 1px solid rgba(255,45,149,0.4);
  }
  .voice-btn.on { background: rgba(255,45,149,0.25); color: #ff2d95; }
  .voice-btn.off { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }
  .captured { min-height: 22px; display: flex; align-items: center; gap: 0px; flex-wrap: wrap; justify-content: center; }
  .board-wrap { position: relative; margin: 4px 0; }
  .board {
    display: grid; border: 1px solid rgba(200,162,255,0.15);
    box-shadow: 0 0 40px rgba(100,0,200,0.2), inset 0 0 20px rgba(0,0,0,0.5);
    border-radius: 3px; overflow: hidden;
  }
  .smack-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 50; overflow: hidden;
  }
  .smack-text {
    font-family: 'Permanent Marker', cursive; font-size: 1.4rem;
    color: #ff2d95; text-align: center; padding: 10px 18px;
    text-shadow: 0 0 20px rgba(255,45,149,0.8), 0 0 40px rgba(255,45,149,0.4),
                 2px 2px 0 rgba(0,0,0,0.9), -1px -1px 0 rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.6); border-radius: 4px;
    max-width: 90%; line-height: 1.3; letter-spacing: 1px;
    opacity: 0; transform: scale(0.8);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .smack-text.visible { opacity: 1; transform: scale(1); }
  .smack-text.big {
    font-size: 1.7rem; color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4),
                 2px 2px 0 rgba(0,0,0,0.9);
  }
  .sq {
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer; transition: background 0.12s;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .sq.light { background: rgba(200,162,255,0.12); }
  .sq.dark { background: rgba(120,80,200,0.06); }
  .sq.selected { background: rgba(0,240,255,0.2) !important; }
  .sq.last-move { background: rgba(255,215,0,0.08) !important; }
  .dot {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.53), rgba(255,215,0,0.13));
    box-shadow: 0 0 6px rgba(255,215,0,0.27);
  }
  .cap-ring { position: absolute; border-radius: 50%; border: 2px solid rgba(255,215,0,0.4); }
  .file-label, .rank-label { position: absolute; font-size: 7px; opacity: 0.2; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
  .file-label { bottom: 1px; right: 3px; }
  .rank-label { top: 1px; left: 3px; }
  .status {
    font-size: 0.8rem; margin-top: 6px; font-weight: 600; min-height: 22px;
    color: rgba(255,255,255,0.7); transition: all 0.2s;
  }
  .status.check { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.53); }
  .btn {
    margin-top: 8px; padding: 7px 20px; font-size: 0.7rem; font-weight: 700;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 5px;
    cursor: pointer; background: rgba(255,255,255,0.05); color: #fff;
    letter-spacing: 2px; text-transform: uppercase; font-family: 'Orbitron', sans-serif;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .promo-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); display: flex; align-items: center;
    justify-content: center; z-index: 100;
  }
  .promo-box {
    background: #0d0a14; border: 1px solid rgba(0,240,255,0.27); border-radius: 10px;
    padding: 16px 20px; box-shadow: 0 0 30px rgba(0,240,255,0.13);
  }
  .promo-box p { font-size: 0.75rem; margin-bottom: 10px; opacity: 0.8; text-align: center; }
  .promo-btn {
    width: 48px; height: 48px; border: 1px solid rgba(0,240,255,0.27); border-radius: 6px;
    background: rgba(0,240,255,0.08); cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center;
    margin: 0 4px; transition: background 0.15s; vertical-align: top;
  }
  .promo-btn:hover { background: rgba(0,240,255,0.2); }
  .piece-svg { filter: drop-shadow(0 0 4px var(--glow)); pointer-events: none; }
  .voice-panel {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); z-index: 200;
    justify-content: center; align-items: center;
  }
  .voice-panel.show { display: flex; }
  .voice-box {
    background: #1a1125; border: 1px solid rgba(255,45,149,0.3); border-radius: 12px;
    padding: 20px 24px; width: 280px; text-align: center;
  }
  .voice-box h2 {
    font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700;
    color: #ff2d95; letter-spacing: 3px; margin-bottom: 16px;
  }
  .voice-label {
    font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.5);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; text-align: left;
  }
  .voice-opt-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .voice-opt {
    flex: 1; padding: 8px 0; border-radius: 6px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5); transition: all 0.15s; text-align: center;
  }
  .voice-opt.active { border-color: #ff2d95; color: #ff2d95; background: rgba(255,45,149,0.15); }
  .voice-opt-wrap { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .voice-opt-sm {
    padding: 6px 10px; border-radius: 5px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 700;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5); transition: all 0.15s; text-align: center;
  }
  .voice-opt-sm.active { border-color: #ff2d95; color: #ff2d95; background: rgba(255,45,149,0.15); }
  .voice-go {
    width: 100%; padding: 10px 0; border-radius: 6px; cursor: pointer;
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 2px; border: 1px solid rgba(0,240,255,0.4);
    background: rgba(0,240,255,0.1); color: #00f0ff; margin-top: 6px;
    transition: all 0.15s;
  }
  .voice-go:hover { background: rgba(0,240,255,0.2); }
  .voice-test {
    width: 100%; padding: 8px 0; border-radius: 6px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 1px; border: 1px solid rgba(255,45,149,0.3);
    background: rgba(255,45,149,0.1); color: #ff2d95; margin-top: 8px;
    transition: all 0.15s;
  }
  .vitem {
    padding: 8px 10px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.12s;
  }
  .vitem:last-child { border-bottom: none; }
  .vitem:active, .vitem.active {
    background: rgba(255,45,149,0.15); color: #ff2d95;
  }
  .vitem .vlang {
    font-size: 0.6rem; opacity: 0.5; margin-left: 6px;
  }
  .pitch-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .pitch-label { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px; min-width: 28px; }
  .pitch-label.man { color: #00f0ff; }
  .pitch-label.woman { color: #ff2d95; }
  .pitch-slider {
    flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
    background: linear-gradient(to right, #00f0ff, #ff2d95); border-radius: 2px; outline: none;
  }
  .pitch-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 2px solid rgba(255,255,255,0.3); cursor: pointer;
  }
</style>
</head>
<body>
<h1>Chess</h1>
<div class="ai-name" id="aiNameDisplay">vs. ???</div>
<div class="controls">
  <button class="voice-btn off" id="voiceToggle" onclick="toggleVoice()">VOICE: OFF</button>
</div>

<!-- Voice Settings Panel -->
<div class="voice-panel" id="voicePanel">
  <div class="voice-box">
    <h2>VOICE SETTINGS</h2>
    <div class="voice-label">Pick a voice</div>
    <div id="voiceList" style="max-height:180px;overflow-y:auto;margin-bottom:14px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;"></div>
    <div class="voice-label">Pitch</div>
    <div class="pitch-row">
      <span class="pitch-label man">♂</span>
      <input type="range" min="0.5" max="1.8" step="0.05" value="1.0" class="pitch-slider" id="pitchSlider">
      <span class="pitch-label woman">♀</span>
    </div>
    <div class="voice-label">Speed</div>
    <div class="voice-opt-row">
      <div class="voice-opt" id="optSlow" onclick="setSpeed('slow')">SLOW</div>
      <div class="voice-opt active" id="optNormal" onclick="setSpeed('normal')">NORMAL</div>
      <div class="voice-opt" id="optFast" onclick="setSpeed('fast')">FAST</div>
    </div>
    <button class="voice-test" onclick="testVoice()">TEST VOICE</button>
    <button class="voice-go" onclick="confirmVoice()">DONE</button>
  </div>
</div>
<div class="captured" id="capBlack"></div>
<div class="board-wrap" id="boardWrap">
  <div class="board" id="board"></div>
  <div class="smack-overlay"><div class="smack-text" id="smackText"></div></div>
</div>
<div class="captured" id="capWhite"></div>
<div class="status" id="status">Your move.</div>
<button class="btn" id="newGame">New Game</button>
<div class="promo-overlay" id="promoOverlay" style="display:none">
  <div class="promo-box">
    <p>Promote to:</p>
    <div id="promoButtons"></div>
  </div>
</div>

<script>
const Pp="p",Nn="n",Bb="b",Rr="r",Qq="q",Kk="k",WW="w",BL="b";
const PV={p:100,n:320,b:330,r:500,q:900,k:20000};
const FILES=["a","b","c","d","e","f","g","h"];

const SVG_PATHS = {
  k: `<g>
      <rect x="20.5" y="1" width="4" height="10" rx="0.8" style="fill:FILL;stroke:STROKE;stroke-width:1"/>
      <rect x="16.5" y="3.5" width="12" height="4" rx="0.8" style="fill:FILL;stroke:STROKE;stroke-width:1"/>
      <ellipse cx="22.5" cy="14" rx="7" ry="4" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="16" y="17" width="13" height="3" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.2"/>
      <path d="M15 20h15l-1.5 14h-12z" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="11" y="34" width="23" height="3" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="9" y="37" width="27" height="4" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      </g>`,
  q: `<g>
      <circle cx="22.5" cy="4" r="3.5" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <ellipse cx="22.5" cy="12" rx="7" ry="4" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="16" y="15" width="13" height="3" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.2"/>
      <path d="M15 18h15l-1.5 16h-12z" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="11" y="34" width="23" height="3" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <rect x="9" y="37" width="27" height="4" rx="1" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      </g>`,
  r: `<g><path d="M9 39h27v-3H9v3zM12.5 32l1.5-2.5h17l1.5 2.5h-20zM12 36v-4h21v4H12z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linejoin:round"/>
      <path d="M14 29.5v-13h17v13H14z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:butt;stroke-linejoin:miter"/>
      <path d="M14 16.5L11 14h23l-3 2.5H14zM11 14V9h4v2h5V9h5v2h5V9h4v5H11z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:butt"/>
      <path d="M12 35.5h21M13 31.5h19M14 29.5h17M14 16.5h17M11 14h23" style="fill:none;stroke:STROKE;stroke-width:1;stroke-linejoin:miter"/></g>`,
  b: `<g><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:butt"/>
      <path d="M15 32c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:butt;stroke-linejoin:round"/>
      <path d="M25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:butt"/>
      <path d="M17.5 26h10M15 30h15" style="fill:none;stroke:STROKE;stroke-width:1.5;stroke-linejoin:miter"/></g>`,
  n: `<g><path d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linejoin:round"/>
      <path d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"/>
      <circle cx="14" cy="15.5" r="1" style="fill:DOTFILL"/><circle cx="17" cy="13" r="1" style="fill:DOTFILL"/></g>`,
  p: `<g><circle cx="22.5" cy="10" r="4" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/>
      <path d="M18 28c-3 6-10.5 8.5-10.5 13.5h30c0-5-7.5-7.5-10.5-13.5" style="fill:FILL;stroke:STROKE;stroke-width:1.5;stroke-linecap:round"/>
      <path d="M15.5 24c1-3 4.5-5.5 7-5.5s6 2.5 7 5.5c-2.5 1-5 1.5-7 1.5s-4.5-.5-7-1.5z" style="fill:FILL;stroke:STROKE;stroke-width:1.5"/></g>`,
};

function makeSVG(type, color, size) {
  const isW = color === WW;
  const fill = isW ? "#00f0ff" : "#ff2d95";
  const stroke = isW ? "#008899" : "#991155";
  const glow = isW ? "#00f0ff" : "#ff2d95";
  const dotFill = isW ? "#008899" : "#ff2d95";
  let path = SVG_PATHS[type].replace(/FILL/g, fill).replace(/STROKE/g, stroke).replace(/DOTFILL/g, dotFill);
  return `<svg class="piece-svg" style="--glow:${glow}" width="${size}" height="${size}" viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg">${path}</svg>`;
}
function makeCapSVG(type, color) { return makeSVG(type, color, 18); }

// ─── VOICE ───
let voiceOn = false;
let chosenVoice = null;
let voiceSpeed = 'normal';
let voiceIdx = -1;
const hasSpeech = typeof speechSynthesis !== 'undefined';
const SPEED_MAP = { slow: 0.75, normal: 0.92, fast: 1.15 };

function getVoices() {
  if (!hasSpeech) return [];
  return speechSynthesis.getVoices();
}

// Known voice name gender mapping
const KNOWN_FEMALE = ['samantha','victoria','karen','moira','fiona','tessa','kate','serena','shelley','stephanie','nicky','martha','susan','hazel','zira','ava','allison','joana','emma','siri','veena','raveena','mei-jia','ting-ting','yuna','kyoko','lekha','milena','sara','anna','helena','paulina','kanya','premium female','female','woman'];
const KNOWN_MALE = ['daniel','james','oliver','thomas','aaron','david','alex','fred','gordon','rishi','lee','jorge','ivan','mark','george','luca','xander','diego','premium male','male','man'];

function guessGender(name) {
  const n = name.toLowerCase();
  for (const f of KNOWN_FEMALE) { if (n.includes(f)) return 'F'; }
  for (const m of KNOWN_MALE) { if (n.includes(m)) return 'M'; }
  return '?';
}

function buildVoiceList() {
  const list = document.getElementById("voiceList");
  if (!list) return;
  list.innerHTML = "";
  const voices = getVoices();
  if (voices.length === 0) {
    list.innerHTML = '<div style="padding:10px;font-size:0.7rem;opacity:0.4;">No voices found. Try opening in Chrome.</div>';
    return;
  }

  // Sort: English first, then by language, then name
  const sorted = voices.map((v, i) => ({v, i})).sort((a, b) => {
    const aEn = a.v.lang.startsWith('en') ? 0 : 1;
    const bEn = b.v.lang.startsWith('en') ? 0 : 1;
    if (aEn !== bEn) return aEn - bEn;
    const lc = a.v.lang.localeCompare(b.v.lang);
    if (lc !== 0) return lc;
    return a.v.name.localeCompare(b.v.name);
  });

  sorted.forEach(({v, i}) => {
    const div = document.createElement("div");
    div.className = "vitem" + (i === voiceIdx ? " active" : "");
    const cleanName = v.name.replace(/Microsoft |Google |com\.google\.android\.tts\//g, '');
    const g = guessGender(v.name);
    const gTag = g === 'F' ? '<span style="color:#ff2d95;margin-right:4px;">♀</span>'
               : g === 'M' ? '<span style="color:#00f0ff;margin-right:4px;">♂</span>'
               : '';
    div.innerHTML = gTag + cleanName + '<span class="vlang">' + v.lang + '</span>';
    div.onclick = () => selectVoice(i);
    list.appendChild(div);
  });

  // Auto-select first English voice if nothing selected
  if (voiceIdx === -1) {
    const firstEn = sorted.find(({v}) => v.lang.startsWith('en'));
    if (firstEn) selectVoice(firstEn.i);
  }
}

function selectVoice(idx) {
  const voices = getVoices();
  if (!voices[idx]) return;
  voiceIdx = idx;
  chosenVoice = voices[idx];
  // Update UI
  const items = document.querySelectorAll(".vitem");
  const sorted = voices.map((v, i) => ({v, i})).sort((a, b) => {
    const aEn = a.v.lang.startsWith('en') ? 0 : 1;
    const bEn = b.v.lang.startsWith('en') ? 0 : 1;
    if (aEn !== bEn) return aEn - bEn;
    const lc = a.v.lang.localeCompare(b.v.lang);
    if (lc !== 0) return lc;
    return a.v.name.localeCompare(b.v.name);
  });
  items.forEach((el, j) => {
    el.className = "vitem" + (sorted[j].i === voiceIdx ? " active" : "");
  });
}

if (hasSpeech && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = buildVoiceList;
}

function setSpeed(s) {
  voiceSpeed = s;
  document.getElementById("optSlow").className = "voice-opt" + (s === 'slow' ? " active" : "");
  document.getElementById("optNormal").className = "voice-opt" + (s === 'normal' ? " active" : "");
  document.getElementById("optFast").className = "voice-opt" + (s === 'fast' ? " active" : "");
}

function testVoice() {
  if (!hasSpeech || !chosenVoice) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance("Checkmate. Get off my board you absolute muppet.");
    u.voice = chosenVoice;
    u.lang = chosenVoice.lang;
    u.rate = SPEED_MAP[voiceSpeed];
    u.pitch = parseFloat(document.getElementById("pitchSlider").value);
    speechSynthesis.speak(u);
  } catch(e) {}
}

function confirmVoice() {
  document.getElementById("voicePanel").classList.remove("show");
  try { speechSynthesis.cancel(); } catch(e) {}
}

function toggleVoice() {
  if (!hasSpeech) { alert("Voice not supported here. Open in Chrome."); return; }
  voiceOn = !voiceOn;
  const btn = document.getElementById("voiceToggle");
  btn.textContent = voiceOn ? "VOICE: ON" : "VOICE: OFF";
  btn.className = "voice-btn " + (voiceOn ? "on" : "off");
  if (voiceOn) {
    try {
      const u = new SpeechSynthesisUtterance(""); u.volume = 0;
      speechSynthesis.speak(u);
    } catch(e) {}
    setTimeout(buildVoiceList, 150);
    document.getElementById("voicePanel").classList.add("show");
  } else {
    document.getElementById("voicePanel").classList.remove("show");
    try { speechSynthesis.cancel(); } catch(e) {}
  }
}

function speakSmack(text) {
  if (!voiceOn || !hasSpeech) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (!chosenVoice && voiceIdx === -1) buildVoiceList();
    if (chosenVoice) { u.voice = chosenVoice; u.lang = chosenVoice.lang; } else { u.lang = "en-GB"; }
    u.rate = SPEED_MAP[voiceSpeed];
    u.pitch = parseFloat(document.getElementById("pitchSlider").value);
    speechSynthesis.speak(u);
  } catch(e) {}
}

const clone2 = b => b.map(r=>r.map(c=>c?{...c}:null));
const inB = (r,c) => r>=0&&r<8&&c>=0&&c<8;

function pseudoMoves(bd,color,ep,cas){
  const mv=[],opp=color===WW?BL:WW,dir=color===WW?-1:1,sr=color===WW?6:1,pr=color===WW?0:7;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const p=bd[r][c]; if(!p||p.color!==color)continue;
    if(p.type===Pp){
      if(inB(r+dir,c)&&!bd[r+dir][c]){
        if(r+dir===pr){for(const x of[Qq,Rr,Bb,Nn])mv.push({fr:r,fc:c,tr:r+dir,tc:c,promo:x});}
        else{mv.push({fr:r,fc:c,tr:r+dir,tc:c});if(r===sr&&!bd[r+2*dir][c])mv.push({fr:r,fc:c,tr:r+2*dir,tc:c});}
      }
      for(const dc of[-1,1]){const nr=r+dir,nc=c+dc;if(!inB(nr,nc))continue;
        if(bd[nr][nc]&&bd[nr][nc].color===opp){if(nr===pr){for(const x of[Qq,Rr,Bb,Nn])mv.push({fr:r,fc:c,tr:nr,tc:nc,promo:x});}else mv.push({fr:r,fc:c,tr:nr,tc:nc});}
        if(ep&&ep[0]===nr&&ep[1]===nc)mv.push({fr:r,fc:c,tr:nr,tc:nc,ep:true});
      }
    }
    if(p.type===Nn)for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&(!bd[nr][nc]||bd[nr][nc].color===opp))mv.push({fr:r,fc:c,tr:nr,tc:nc});}
    if(p.type===Bb||p.type===Qq)for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(bd[nr][nc]){if(bd[nr][nc].color===opp)mv.push({fr:r,fc:c,tr:nr,tc:nc});break;}mv.push({fr:r,fc:c,tr:nr,tc:nc});nr+=dr;nc+=dc;}}
    if(p.type===Rr||p.type===Qq)for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(bd[nr][nc]){if(bd[nr][nc].color===opp)mv.push({fr:r,fc:c,tr:nr,tc:nc});break;}mv.push({fr:r,fc:c,tr:nr,tc:nc});nr+=dr;nc+=dc;}}
    if(p.type===Kk){
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&(!bd[nr][nc]||bd[nr][nc].color===opp))mv.push({fr:r,fc:c,tr:nr,tc:nc});}
      const row=color===WW?7:0;
      if(r===row&&c===4){
        if(cas[color+"k"]&&!bd[row][5]&&!bd[row][6]&&bd[row][7]?.type===Rr)mv.push({fr:r,fc:c,tr:row,tc:6,castle:"k"});
        if(cas[color+"q"]&&!bd[row][3]&&!bd[row][2]&&!bd[row][1]&&bd[row][0]?.type===Rr)mv.push({fr:r,fc:c,tr:row,tc:2,castle:"q"});
      }
    }
  }
  return mv;
}

function findKing(bd,color){for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(bd[r][c]?.type===Kk&&bd[r][c]?.color===color)return[r,c];return null;}

function isAtt(bd,r,c,by){
  const dir=by===WW?-1:1;
  for(const dc of[-1,1]){const pr2=r-dir,pc=c+dc;if(inB(pr2,pc)&&bd[pr2][pc]?.type===Pp&&bd[pr2][pc]?.color===by)return true;}
  for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&bd[nr][nc]?.type===Nn&&bd[nr][nc]?.color===by)return true;}
  for(const[dr,dc]of[[-1,-1],[-1,1],[1,-1],[1,1]]){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(bd[nr][nc]){if(bd[nr][nc].color===by&&(bd[nr][nc].type===Bb||bd[nr][nc].type===Qq))return true;break;}nr+=dr;nc+=dc;}}
  for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(bd[nr][nc]){if(bd[nr][nc].color===by&&(bd[nr][nc].type===Rr||bd[nr][nc].type===Qq))return true;break;}nr+=dr;nc+=dc;}}
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&bd[nr][nc]?.type===Kk&&bd[nr][nc]?.color===by)return true;}
  return false;
}

function applyMv(bd,m){
  const b=clone2(bd),pc={...b[m.fr][m.fc]};b[m.fr][m.fc]=null;
  if(m.ep)b[m.fr][m.tc]=null;if(m.promo)pc.type=m.promo;b[m.tr][m.tc]=pc;
  if(m.castle){const row=m.fr;if(m.castle==="k"){b[row][5]=b[row][7];b[row][7]=null;}else{b[row][3]=b[row][0];b[row][0]=null;}}
  return b;
}

function legal(bd,color,ep,cas){
  const ps=pseudoMoves(bd,color,ep,cas),opp=color===WW?BL:WW;
  return ps.filter(m=>{
    if(m.castle){const row=m.fr;if(isAtt(bd,row,4,opp))return false;
      if(m.castle==="k"&&(isAtt(bd,row,5,opp)||isAtt(bd,row,6,opp)))return false;
      if(m.castle==="q"&&(isAtt(bd,row,3,opp)||isAtt(bd,row,2,opp)))return false;}
    const nb=applyMv(bd,m),kp=findKing(nb,color);return kp&&!isAtt(nb,kp[0],kp[1],opp);
  });
}

function updCas(cas,m){
  const c={...cas};
  if(m.fr===7&&m.fc===4){c.wk=false;c.wq=false;}if(m.fr===0&&m.fc===4){c.bk=false;c.bq=false;}
  if((m.fr===7&&m.fc===7)||(m.tr===7&&m.tc===7))c.wk=false;
  if((m.fr===7&&m.fc===0)||(m.tr===7&&m.tc===0))c.wq=false;
  if((m.fr===0&&m.fc===7)||(m.tr===0&&m.tc===7))c.bk=false;
  if((m.fr===0&&m.fc===0)||(m.tr===0&&m.tc===0))c.bq=false;
  return c;
}

const PST={p:PST_P,n:PST_N,b:PST_B,r:PST_R};

function evalBd(bd){
  let s=0;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=bd[r][c];if(!p)continue;const sg=p.color===WW?1:-1;s+=sg*PV[p.type];const t=PST[p.type];if(t)s+=sg*t[p.color===WW?r:7-r][c];}
  return s;
}

function materialScore(bd){
  let w=0,b=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=bd[r][c];if(!p)continue;if(p.color===WW)w+=PV[p.type];else b+=PV[p.type];}
  return{w,b};
}

function ab(bd,depth,alpha,beta,isW,ep,cas){
  const color=isW?WW:BL,mvs=legal(bd,color,ep,cas);
  if(mvs.length===0){const kp=findKing(bd,color),opp=isW?BL:WW;if(kp&&isAtt(bd,kp[0],kp[1],opp))return isW?-999999:999999;return 0;}
  if(depth===0)return evalBd(bd);
  mvs.sort((a,b2)=>{const ca=bd[a.tr][a.tc]?PV[bd[a.tr][a.tc].type]:0,cb=bd[b2.tr][b2.tc]?PV[bd[b2.tr][b2.tc].type]:0;return cb-ca;});
  if(isW){let best=-Infinity;for(const m of mvs){const nb=applyMv(bd,m);let nep=null;if(bd[m.fr][m.fc]?.type===Pp&&Math.abs(m.tr-m.fr)===2)nep=[(m.fr+m.tr)/2,m.fc];best=Math.max(best,ab(nb,depth-1,alpha,beta,false,nep,updCas(cas,m)));alpha=Math.max(alpha,best);if(alpha>=beta)break;}return best;}
  else{let best=Infinity;for(const m of mvs){const nb=applyMv(bd,m);let nep=null;if(bd[m.fr][m.fc]?.type===Pp&&Math.abs(m.tr-m.fr)===2)nep=[(m.fr+m.tr)/2,m.fc];best=Math.min(best,ab(nb,depth-1,alpha,beta,true,nep,updCas(cas,m)));beta=Math.min(beta,best);if(alpha>=beta)break;}return best;}
}

function aiThink2(bd,ep,cas){
  const mvs=legal(bd,BL,ep,cas);if(mvs.length===0)return null;
  let best=mvs[0],bestVal=Infinity;
  for(const m of mvs){const nb=applyMv(bd,m);let nep=null;if(bd[m.fr][m.fc]?.type===Pp&&Math.abs(m.tr-m.fr)===2)nep=[(m.fr+m.tr)/2,m.fc];
    const val=ab(nb,3,-Infinity,Infinity,true,nep,updCas(cas,m));if(val<bestVal){bestVal=val;best=m;}}
  return best;
}

function execMove(move) {
  const cap = board[move.tr][move.tc];
  const capType = cap?.type;
  board = applyMv(board, move);
  if (cap) { if(cap.color===WW) capturedW.push(cap.type); else capturedB.push(cap.type); }
  if (move.ep) { if(turn===WW) capturedB.push(Pp); else capturedW.push(Pp); }
  let newEp = null;
  if (board[move.tr][move.tc]?.type === Pp && Math.abs(move.tr - move.fr) === 2)
    newEp = [(move.fr + move.tr) / 2, move.fc];
  enPassant = newEp;
  castling = updCas(castling, move);
  lastMove = [move.fr, move.fc, move.tr, move.tc];
  selected = null; highlights = []; moveCount++;

  const nextColor = turn === WW ? BL : WW;
  const nextMvs = legal(board, nextColor, enPassant, castling);
  const kp = findKing(board, nextColor);
  const inCheck = kp && isAtt(board, kp[0], kp[1], turn);

  if (nextMvs.length === 0) {
    if (inCheck) {
      if (turn === WW) { showSmack(pick(SMACK.playerWin), true); setStatus("Checkmate. You win!"); }
      else { showSmack(pick(SMACK.aiWin), true); setStatus("Checkmate. " + aiName + " wins."); }
    } else { showSmack(pick(SMACK.stalemate), true); setStatus("Stalemate. Draw."); }
    gameOver = true; turn = nextColor; render(); return;
  }

  // SMACK ONLY ON MEANINGFUL MOMENTS
  if (turn === BL) {
    if (cap) {
      if (capType === Qq) showSmack(pick(SMACK.aiCaptureQueen), true);
      else if (capType === Rr) showSmack(pick(SMACK.aiCaptureRook), true);
      else showSmack(pick(SMACK.aiCapture), false);
    } else if (inCheck) {
      showSmack(pick(SMACK.aiCheck), true);
    } else {
      const ms = materialScore(board);
      if (ms.b > ms.w + 200) showSmack(pick(SMACK.aiWinning), false);
    }
  } else {
    if (cap) {
      if (capType === Qq) showSmack(pick(SMACK.playerCaptureQueen), false);
      else showSmack(pick(SMACK.playerCapture), false);
    } else if (inCheck) {
      showSmack(pick(SMACK.playerCheck), false);
    } else {
      const ms = materialScore(board);
      if (ms.w > ms.b + 200) showSmack(pick(SMACK.aiLosing), false);
    }
  }

  if (inCheck) setStatus(nextColor === WW ? "Check! Your move." : "Check. " + aiName + " thinking...");
  else setStatus(nextColor === WW ? "Your move." : aiName + " thinking...");
  turn = nextColor;

  if (turn === BL) {
    thinking = true; render();
    setTimeout(() => {
      const am = aiThink2(board, enPassant, castling);
      if (am) { turn = BL; execMove(am); }
      thinking = false; turn = WW; render(); startIdleTimer();
    }, 250);
  } else { render(); startIdleTimer(); }
}

function handleClick(r, c) {
  if (thinking || gameOver || turn !== WW) return;
  clearTimeout(idleTimer);
  const mvs = legal(board, WW, enPassant, castling);
  if (selected) {
    const move = mvs.find(m => m.fr===selected[0]&&m.fc===selected[1]&&m.tr===r&&m.tc===c&&!m.promo);
    const promo = mvs.find(m => m.fr===selected[0]&&m.fc===selected[1]&&m.tr===r&&m.tc===c&&m.promo);
    if (promo) { promoData={fr:selected[0],fc:selected[1],tr:r,tc:c}; selected=null; highlights=[]; showPromo(); render(); return; }
    if (move) { execMove(move); return; }
  }
  const piece = board[r][c];
  if (piece && piece.color === WW) {
    selected = [r, c];
    highlights = mvs.filter(m => m.fr===r&&m.fc===c).map(m=>[m.tr,m.tc]);
  } else { selected = null; highlights = []; }
  render(); startIdleTimer();
}

function showPromo() {
  const ov = document.getElementById("promoOverlay"); ov.style.display = "flex";
  const btns = document.getElementById("promoButtons"); btns.innerHTML = "";
  for (const t of [Qq, Rr, Bb, Nn]) {
    const b = document.createElement("button"); b.className = "promo-btn";
    b.innerHTML = makeSVG(t, WW, 32);
    b.onclick = () => { ov.style.display = "none"; const m = {fr:promoData.fr,fc:promoData.fc,tr:promoData.tr,tc:promoData.tc,promo:t}; promoData = null; execMove(m); };
    btns.appendChild(b);
  }
}

function render() {
  const maxW = Math.min(window.innerWidth - 32, 480);
  const maxH = window.innerHeight - 220;
  const sq = Math.max(32, Math.min(Math.floor(Math.min(maxW, maxH) / 8), 56));
  const baseSize = Math.max(22, Math.round(sq * 0.78));
  const PIECE_SCALE = { k: 1.0, q: 0.92, r: 0.82, b: 0.82, n: 0.82, p: 0.68 };

  const bEl = document.getElementById("board");
  bEl.style.gridTemplateColumns = `repeat(8, ${sq}px)`;
  bEl.innerHTML = "";

  const hlSet = new Set(highlights.map(([r,c])=>`${r},${c}`));
  const lmSet = lastMove ? new Set([`${lastMove[0]},${lastMove[1]}`,`${lastMove[2]},${lastMove[3]}`]) : new Set();

  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const div = document.createElement("div");
    div.className = "sq " + ((r+c)%2===0?"light":"dark");
    div.style.width = sq+"px"; div.style.height = sq+"px";
    if (selected && selected[0]===r && selected[1]===c) div.classList.add("selected");
    else if (lmSet.has(`${r},${c}`)) div.classList.add("last-move");

    if (r===7) { const fl=document.createElement("span"); fl.className="file-label"; fl.textContent=FILES[c]; div.appendChild(fl); }
    if (c===0) { const rl=document.createElement("span"); rl.className="rank-label"; rl.textContent=8-r; div.appendChild(rl); }

    const isHl = hlSet.has(`${r},${c}`);
    const cell = board[r][c];
    if (isHl && !cell) {
      const dot = document.createElement("div"); dot.className="dot";
      dot.style.width = Math.round(sq*0.22)+"px"; dot.style.height = Math.round(sq*0.22)+"px";
      div.appendChild(dot);
    }
    if (isHl && cell) {
      const ring = document.createElement("div"); ring.className="cap-ring";
      ring.style.width = (sq-6)+"px"; ring.style.height = (sq-6)+"px";
      div.appendChild(ring);
    }
    if (cell) {
      const wrap = document.createElement("div");
      const pSize = Math.round(baseSize * PIECE_SCALE[cell.type]);
      wrap.innerHTML = makeSVG(cell.type, cell.color, pSize);
      wrap.style.display = "flex"; wrap.style.alignItems = "center"; wrap.style.justifyContent = "center";
      div.appendChild(wrap);
    }
    div.onclick = () => handleClick(r, c);
    bEl.appendChild(div);
  }

  const order = [Qq,Rr,Bb,Nn,Pp];
  const cwEl = document.getElementById("capWhite"); cwEl.innerHTML = "";
  [...capturedW].sort((a,b2)=>order.indexOf(a)-order.indexOf(b2)).forEach(t => {
    const sp = document.createElement("span"); sp.innerHTML = makeCapSVG(t, WW); sp.style.display="inline-block"; cwEl.appendChild(sp);
  });
  const cbEl = document.getElementById("capBlack"); cbEl.innerHTML = "";
  [...capturedB].sort((a,b2)=>order.indexOf(a)-order.indexOf(b2)).forEach(t => {
    const sp = document.createElement("span"); sp.innerHTML = makeCapSVG(t, BL); sp.style.display="inline-block"; cbEl.appendChild(sp);
  });
}

document.getElementById("newGame").onclick = init;
window.addEventListener("resize", () => { if (!thinking) render(); });
init();
</script>
